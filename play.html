<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
            background: linear-gradient(180deg, #ffc0cb 0%, #ffedf3 100%); 
            font-family: 'Arial', sans-serif; overflow: hidden; text-align: center; 
        }
        .gif-container img { width: 160px; height: 160px; border-radius: 20px; margin-bottom: 15px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #ff1493; font-size: 1.5rem; padding: 0 15px; margin: 10px 0; }
        #message { color: #8b008b; font-weight: bold; min-height: 40px; margin-bottom: 20px; }
        
        .btn-wrapper { 
            position: relative; width: 100%; height: 60px; 
            display: flex; justify-content: center; align-items: center; gap: 30px; 
        }
        button { 
            width: 100px; height: 45px; font-size: 1rem; border: none; 
            border-radius: 50px; cursor: pointer; font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); z-index: 10;
        }
        #yesBtn { background-color: #28a745; color: white; position: relative; }
        #noBtn { background-color: #dc3545; color: white; position: relative; transition: 0.1s; }
    </style>
</head>
<body>
    <div class="gif-container">
        <img id="statusGif" src="start.gif" onerror="this.src='https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExOHpndW1uNHByY3RscHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4eHh4JmVwPXYxX2ludGVybmFsX2dpZl9ieV9pZCZjdD1z/cLS1cfxvGOPVpf9g3y/giphy.gif'">
    </div>
    <h1 id="heading">Do you love me? ❤️</h1>
    <p id="message">Maan jao na, please... ✨</p>
    
    <div class="btn-wrapper">
        <button id="yesBtn" onclick="sayYes()">Yes</button>
        <button id="noBtn" onmouseover="moveNo()" onclick="moveNo()">No</button>
    </div>

    <script>
        const noBtn = document.getElementById('noBtn');
        const yesBtn = document.getElementById('yesBtn');
        const messageText = document.getElementById('message');
        const heading = document.getElementById('heading');
        const statusGif = document.getElementById('statusGif');

        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('name') || "Sweetie";
        heading.innerText = userName + ", do you love me? ❤️";

        const texts = ["Aisa kyon? 😢", "Plz maan jao! 🙏", "Kitna bhagaoge? 😂", "Dil mat todo 💔", "I'm crying... 😭"];
        const gifs = ["sad1.gif", "sad2.gif", "sad1.gif", "sad2.gif", "sad1.gif"]; 
        let i = 0;

        function moveNo() {
            noBtn.style.position = "fixed";
            const x = Math.random() * (window.innerWidth - 110);
            const y = Math.random() * (window.innerHeight - 150);
            noBtn.style.left = x + 'px';
            noBtn.style.top = y + 'px';
            
            messageText.innerText = texts[i];
            statusGif.src = gifs[i]; // Offline GIF load karega
            i = (i + 1) % texts.length;
        }

        function sayYes() {
            heading.innerText = "Kya hum hamesha saath rahenge, " + userName + "? 🥺💖";
            messageText.innerText = "Ab hum hamesha saath rahenge! 🥰";
            statusGif.src = "happy.gif"; // Final Happy GIF
            noBtn.style.display = 'none';
            yesBtn.style.position = "static";
            yesBtn.style.margin = "0 auto";
        }
    </script>
</body>
</html>
